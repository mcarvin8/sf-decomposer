---
name: Dependabot Auto-Merge

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Checkout PR branch
        if: steps.metadata.outputs.package-ecosystem == 'npm_and_yarn' && contains(steps.metadata.outputs.dependency-names, '@salesforce/source-deploy-retrieve')
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        if: steps.metadata.outputs.package-ecosystem == 'npm_and_yarn' && contains(steps.metadata.outputs.dependency-names, '@salesforce/source-deploy-retrieve')
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        if: steps.metadata.outputs.package-ecosystem == 'npm_and_yarn' && contains(steps.metadata.outputs.dependency-names, '@salesforce/source-deploy-retrieve')
        run: yarn install

      - name: Build
        if: steps.metadata.outputs.package-ecosystem == 'npm_and_yarn' && contains(steps.metadata.outputs.dependency-names, '@salesforce/source-deploy-retrieve')
        run: yarn build

      - name: Check if SDR metadata registry changed
        id: registry-check
        if: steps.metadata.outputs.package-ecosystem == 'npm_and_yarn' && contains(steps.metadata.outputs.dependency-names, '@salesforce/source-deploy-retrieve')
        env:
          OLD_VERSION: ${{ steps.metadata.outputs.previous-version }}
        run: |
          REGISTRY_PATH="lib/src/registry/metadataRegistry.json"

          # Download old version tarball to extract its registry
          TARBALL=$(npm pack "@salesforce/source-deploy-retrieve@${OLD_VERSION}" --pack-destination /tmp 2>/dev/null)
          mkdir -p /tmp/sdr-old
          tar -xzf "/tmp/${TARBALL}" -C /tmp/sdr-old

          # Compare metadata registries
          OLD_FILE="/tmp/sdr-old/package/${REGISTRY_PATH}"
          NEW_FILE="node_modules/@salesforce/source-deploy-retrieve/${REGISTRY_PATH}"

          if diff -q "$OLD_FILE" "$NEW_FILE" > /dev/null 2>&1; then
            echo "registry_changed=false" >> "$GITHUB_OUTPUT"
            echo "No metadata registry changes detected between SDR versions"
          else
            echo "registry_changed=true" >> "$GITHUB_OUTPUT"
            echo "Metadata registry changes detected between SDR versions"
          fi

          # Cleanup
          rm -rf /tmp/sdr-old "/tmp/${TARBALL}"

      - name: Close PR if not a registry change
        if: steps.registry-check.outputs.registry_changed == 'false'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          OLD_VERSION: ${{ steps.metadata.outputs.previous-version }}
          NEW_VERSION: ${{ steps.metadata.outputs.new-version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr close "$PR_URL" --comment "Closing: @salesforce/source-deploy-retrieve update from ${OLD_VERSION} to ${NEW_VERSION} does not include metadata registry changes."

      - name: Enable auto-merge for Dependabot PRs
        if: steps.registry-check.outputs.registry_changed == 'true'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"
