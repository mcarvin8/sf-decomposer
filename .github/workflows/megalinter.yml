name: MegaLinter

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  issues: write
  pull-requests: write
  statuses: write

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  megalinter:
    name: MegaLinter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: MegaLinter
        uses: oxsecurity/megalinter/flavors/javascript@v9
        env:
          APPLY_FIXES: all
          VALIDATE_ALL_CODEBASE: true

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: megalinter-reports
          path: |
            megalinter-reports
            mega-linter.log
