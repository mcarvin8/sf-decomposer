# Manual smoke test: latest sf-decomposer from npm + CLI round-trip vs fixture baselines.
# Reuses the NUT suite with TESTKIT_EXECUTABLE_PATH=sf so commands run through the real CLI.
name: Smoke test (published plugin)

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  published-plugin-nuts:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 'lts/*'
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Install Salesforce CLI and plugin
        shell: bash
        run: |
          npm install --global @salesforce/cli
          echo 'y' | sf plugins install --force sf-decomposer@latest
          sf version --verbose --json

      - name: Use runner Salesforce CLI home in Testkit
        shell: bash
        run: node -e "require('fs').appendFileSync(process.env.GITHUB_ENV, 'TESTKIT_HOMEDIR=' + require('os').homedir() + '\n')"

      - name: Decompose / recompose and compare to baselines
        run: npm run test:nuts
        env:
          TESTKIT_EXECUTABLE_PATH: sf
          SF_DISABLE_TELEMETRY: true
