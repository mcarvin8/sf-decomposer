# Performance benchmark for the decompose/recompose pipeline against deterministic
# synthetic large-org fixtures (see scripts/gen-perf-fixtures.ts).
#
# Triggers:
#   - workflow_dispatch  : ad-hoc; pick a profile/formats/types from the UI.
#   - schedule (weekly)  : Monday 05:00 UTC; catches slow drift from npm dep
#                          updates, runner-image refreshes, V8/Rust upstream.
#   - workflow_call      : invoked by release.yml after a successful publish so
#                          every version on npm has a perf artifact attached.
#   - pull_request       : compares the PR head against the gh-pages baseline
#                          and posts a sticky comment with the deltas. Runs the
#                          same profile/formats as the baseline so bench names
#                          line up; otherwise the action would render the PR's
#                          metrics as brand-new charts instead of new points on
#                          the existing series. Skipped for fork PRs because
#                          GITHUB_TOKEN is read-only there - re-introduce via
#                          a workflow_run companion if/when external
#                          contributions need this. Doc-only PRs are filtered
#                          out so they don't pay the ~3-4 minute cost.
name: Performance

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Fixture size profile'
        type: choice
        default: large
        options:
          - small
          - medium
          - large
          - xlarge
      formats:
        description: 'Comma-separated formats to test (xml,json,json5,yaml)'
        type: string
        default: 'xml,json,json5,yaml'
      types:
        description: 'Comma-separated metadata types (blank = defaults from test/perf/decompose.perf.ts)'
        type: string
        default: ''
      publish:
        description: 'Publish runtime/memory results to gh-pages (only enable for runs you want on the dashboard)'
        type: boolean
        default: false
  schedule:
    # Mondays 05:00 UTC - quiet hours on the GitHub-hosted runner pool.
    - cron: '0 5 * * 1'
  pull_request:
    # Skip cosmetic/doc-only PRs so they don't burn ~3-4 minutes of CI per push.
    # Code that can plausibly affect runtime/memory lives outside these paths.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_call:
    inputs:
      profile:
        type: string
        required: false
        default: large
      formats:
        type: string
        required: false
        default: 'xml,json,json5,yaml'
      types:
        type: string
        required: false
        default: ''
      publish:
        description: 'Publish runtime/memory results to gh-pages'
        type: boolean
        required: false
        default: false

permissions:
  contents: read

# Cancel in-progress perf runs for the same PR/branch when a new commit lands.
# Without this, force-pushing N times to a PR queues N x ~3-4 minute jobs. The
# release/schedule/dispatch flows run on main or detached refs, where each run
# gets a unique group key, so this only collapses redundant PR runs.
concurrency:
  group: perf-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  perf:
    name: Perf (${{ inputs.profile || 'large' }})
    # Skip fork PRs: GITHUB_TOKEN is read-only on PRs from forks, so the
    # comment step would fail and the publish steps couldn't push anyway.
    # If/when external contributions need PR perf comments, split this into a
    # pull_request_target / workflow_run companion that runs in the base repo
    # context with elevated perms.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    # Single OS, single Node version: cross-runner / cross-Node perf is too
    # noisy to be useful. Correctness is already covered by test.yml's matrix.
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # contents:write    - benchmark-action publish steps push to gh-pages.
    # pull-requests:write - PR comparison step posts/updates the sticky comment.
    # Steps that don't need a given perm just don't use it; GitHub doesn't
    # downgrade per-step.
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 'lts/*'
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run compile

      - name: Print runner facts
        run: |
          echo "## Runner facts" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "image:    $ImageOS / $ImageVersion" >> "$GITHUB_STEP_SUMMARY"
          echo "node:     $(node --version)" >> "$GITHUB_STEP_SUMMARY"
          echo "cpu:      $(grep 'model name' /proc/cpuinfo | head -1 | cut -d: -f2 | xargs)" >> "$GITHUB_STEP_SUMMARY"
          echo "cores:    $(nproc)" >> "$GITHUB_STEP_SUMMARY"
          echo "mem:      $(free -h | awk '/^Mem:/ {print $2}')" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Run performance suite
        run: npm run test:perf
        env:
          PERF_PROFILE: ${{ inputs.profile || 'large' }}
          PERF_FORMATS: ${{ inputs.formats || 'xml,json,json5,yaml' }}
          PERF_TYPES: ${{ inputs.types }}
          SF_DISABLE_TELEMETRY: true
          # Node tuning for reproducibility:
          #   - disable JIT randomization-sensitive optimizations off by default
          #   - explicit max old space so a leak fails loudly rather than swapping
          NODE_OPTIONS: '--max-old-space-size=4096'
          # Surface sibling-collision fallback signals from the Rust crate
          # alongside the default `error` lines. A WARN here means a synthetic
          # fixture has degenerated to share unique-id values across siblings
          # (the same shape we patch in src/metadata/uniqueIdElements.ts for
          # real metadata). The 0.99 byte-retention guard still catches actual
          # data loss; this just makes the cause visible in the action log.
          # See README -> "XML disassemble output (Rust crate)".
          RUST_LOG: warn

      - name: Summarize results
        if: always()
        run: |
          if [ ! -d perf-results ]; then
            echo "No perf-results/ directory; the test likely failed before reporting." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "## Perf results (profile=${PERF_PROFILE:-large})" >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '| Format | Sample | Elapsed (ms) | RSS Δ (MB) |' >> "$GITHUB_STEP_SUMMARY"
          echo '|---|---|---:|---:|' >> "$GITHUB_STEP_SUMMARY"
          node -e '
            const fs = require("fs"), path = require("path");
            const dir = "perf-results";
            const files = fs.readdirSync(dir).filter(f => f.endsWith(".json")).sort();
            for (const f of files) {
              const r = JSON.parse(fs.readFileSync(path.join(dir, f), "utf8"));
              for (const s of r.samples) {
                const ms = s.elapsedMs.toFixed(1);
                const rss = (s.rssDeltaBytes / 1024 / 1024).toFixed(2);
                process.stdout.write(`| ${r.format} | ${s.label} | ${ms} | ${rss} |\n`);
              }
            }
          ' >> "$GITHUB_STEP_SUMMARY"
        env:
          PERF_PROFILE: ${{ inputs.profile || 'large' }}

      - name: Upload perf artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: perf-results-${{ inputs.profile || 'large' }}-${{ github.run_id }}
          path: |
            perf-results/
          retention-days: 90
          if-no-files-found: warn

      # ---------------------------------------------------------------------
      # Publish runtime + memory trends to the gh-pages dashboard.
      #
      # Gated to schedule (weekly) and explicit publish=true callers
      # (release.yml) only so ad-hoc workflow_dispatch runs - which often vary
      # the profile/types/formats inputs - don't pollute the timeline. The
      # dashboard renders at
      #   https://<owner>.github.io/sf-decomposer/dev/bench/runtime/
      #   https://<owner>.github.io/sf-decomposer/dev/bench/memory/
      # First publish creates the gh-pages branch automatically. Pages must
      # be enabled in repo settings (Source: Deploy from branch -> gh-pages).
      #
      # NOTE: do not check `github.event_name == 'workflow_call'` here -
      # inside a reusable workflow `github.event_name` reflects the caller's
      # triggering event (e.g. 'push' from release.yml), never 'workflow_call'.
      # ---------------------------------------------------------------------
      - name: Convert perf-results to benchmark-action JSON
        if: github.event_name == 'schedule' || inputs.publish == true
        run: node scripts/perf-to-benchmark.mjs

      - name: Publish runtime benchmark
        if: github.event_name == 'schedule' || inputs.publish == true
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Decompose Runtime
          tool: customSmallerIsBetter
          output-file-path: ./perf-runtime.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          # GH-hosted runners can swing 20-30% on the same workload; 150% is
          # loose enough to avoid noise but still flag a genuine 1.5x regression.
          alert-threshold: '150%'
          fail-on-alert: false
          comment-on-alert: true
          summary-always: true
          benchmark-data-dir-path: dev/bench/runtime

      - name: Publish memory benchmark
        if: github.event_name == 'schedule' || inputs.publish == true
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Decompose Memory
          tool: customSmallerIsBetter
          output-file-path: ./perf-memory.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          # gh-pages was already fetched by the runtime step above; skip the
          # second fetch to halve checkout time.
          skip-fetch-gh-pages: true
          # Memory deltas are noisier than wall-time; use a wider band.
          alert-threshold: '200%'
          fail-on-alert: false
          summary-always: true
          benchmark-data-dir-path: dev/bench/memory

      # ---------------------------------------------------------------------
      # PR comparison comment (Phase 2).
      #
      # On pull_request events, generate the same benchmark JSON as the
      # publish path, but instead of pushing to gh-pages we ask the action
      # to read the existing baseline, render a sticky comment with the
      # per-bench deltas, and discard the new data point. comment-always
      # (vs comment-on-alert) is intentional: even green runs are useful
      # signal on perf-sensitive PRs, and a single sticky comment beats
      # scrolling for a status check.
      #
      # auto-push:false + save-data-file:false ensures the timeline on
      # gh-pages stays a clean record of merged code; PR runs never appear
      # there. fail-on-alert stays false to match the publish steps - perf
      # regressions surface as a comment, not a required-check failure.
      #
      # If the bench names emitted by this run don't already exist on
      # gh-pages (e.g. someone changed PERF_FORMATS / PERF_TYPES to something
      # the baseline doesn't cover), the action posts the values without a
      # delta. That's fine - it just means there's no apples-to-apples
      # comparison yet, not that anything is broken.
      # ---------------------------------------------------------------------
      - name: Convert perf-results for PR comparison
        if: github.event_name == 'pull_request'
        run: node scripts/perf-to-benchmark.mjs

      - name: Compare runtime against baseline (PR)
        if: github.event_name == 'pull_request'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Decompose Runtime
          tool: customSmallerIsBetter
          output-file-path: ./perf-runtime.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          save-data-file: false
          alert-threshold: '150%'
          fail-on-alert: false
          comment-always: true
          summary-always: true
          benchmark-data-dir-path: dev/bench/runtime

      - name: Compare memory against baseline (PR)
        if: github.event_name == 'pull_request'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Decompose Memory
          tool: customSmallerIsBetter
          output-file-path: ./perf-memory.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          save-data-file: false
          skip-fetch-gh-pages: true
          alert-threshold: '200%'
          fail-on-alert: false
          comment-always: true
          summary-always: true
          benchmark-data-dir-path: dev/bench/memory
