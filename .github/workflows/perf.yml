# Performance benchmark for the decompose/recompose pipeline against deterministic
# synthetic large-org fixtures (see scripts/gen-perf-fixtures.ts).
#
# Triggers:
#   - workflow_dispatch  : ad-hoc; pick a profile/formats/types from the UI.
#   - schedule (weekly)  : Monday 05:00 UTC; catches slow drift from npm dep
#                          updates, runner-image refreshes, V8/Rust upstream.
#   - workflow_call      : invoked by release.yml after a successful publish so
#                          every version on npm has a perf artifact attached.
#   - pull_request       : benchmarks the PR base ref, then the PR head ref,
#                          back to back on the same runner, and posts a sticky
#                          comment with the deltas (scripts/compare-perf-baseline.mjs).
#                          Same-runner/same-moment diffing avoids the 20-30%
#                          run-to-run swings a gh-pages-history comparison
#                          would inherit from running on different runners at
#                          different times. Skipped for fork PRs because
#                          GITHUB_TOKEN is read-only there - re-introduce via
#                          a workflow_run companion if/when external
#                          contributions need this. Doc-only PRs are filtered
#                          out so they don't pay the ~6-8 minute cost (base +
#                          head runs).
#
# Profile matrix: schedule/pull_request run BOTH `large` (single-huge-file shape) and
# `manyfiles` (many-small-files-in-one-directory shape, the one that actually exercises
# config-disassembler's directory-mode concurrent fan-out -- see config-disassembler#97/#99)
# as parallel matrix jobs, so a regression in either shape is caught before merge instead of
# waiting for the next weekly/release run. workflow_dispatch and workflow_call keep their
# existing single-profile behavior (`inputs.profile`, default `large`) unchanged -- matrix
# only kicks in when `inputs.profile` isn't set at all, which is exactly the case for
# schedule/pull_request (neither trigger declares an `inputs:` block).
name: Performance

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Fixture size profile'
        type: choice
        default: large
        options:
          - small
          - medium
          - large
          - xlarge
          - manyfiles
      formats:
        description: 'Comma-separated formats to test (xml,json,json5,yaml)'
        type: string
        default: 'xml,json,json5,yaml'
      types:
        description: 'Comma-separated metadata types (blank = defaults from test/perf/decompose.perf.ts)'
        type: string
        default: ''
      publish:
        description: 'Publish runtime/memory results to gh-pages (only enable for runs you want on the dashboard)'
        type: boolean
        default: false
  schedule:
    # Mondays 05:00 UTC - quiet hours on the GitHub-hosted runner pool.
    - cron: '0 5 * * 1'
  pull_request:
    # Skip cosmetic/doc-only PRs so they don't burn ~6-8 minutes of CI per push
    # (base-ref + head-ref runs - see the trigger comment above).
    # Code that can plausibly affect runtime/memory lives outside these paths.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_call:
    inputs:
      profile:
        type: string
        required: false
        default: large
      formats:
        type: string
        required: false
        default: 'xml,json,json5,yaml'
      types:
        type: string
        required: false
        default: ''
      publish:
        description: 'Publish runtime/memory results to gh-pages'
        type: boolean
        required: false
        default: false

permissions:
  contents: read

# Cancel in-progress perf runs for the same PR/branch when a new commit lands.
# Without this, force-pushing N times to a PR queues N x ~6-8 minute jobs. The
# release/schedule/dispatch flows run on main or detached refs, where each run
# gets a unique group key, so this only collapses redundant PR runs.
concurrency:
  group: perf-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  perf:
    name: Perf (${{ matrix.profile }})
    # Skip fork PRs: GITHUB_TOKEN is read-only on PRs from forks, so the
    # comment step would fail and the publish steps couldn't push anyway.
    # If/when external contributions need PR perf comments, split this into a
    # pull_request_target / workflow_run companion that runs in the base repo
    # context with elevated perms.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    # Single OS, single Node version: cross-runner / cross-Node perf is too
    # noisy to be useful. Correctness is already covered by test.yml's matrix.
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      # Only pull_request is safe to fully parallelize: its comparison is same-runner-only
      # and never touches gh-pages, so there's no gh-pages write to race. Every
      # other trigger that reaches this matrix with 2+ profiles (schedule) pushes to the
      # same gh-pages branch/file per profile; running those concurrently risks one
      # matrix entry's push getting rejected (or racing) against the other's. Serialize
      # (max-parallel: 1) for anything but pull_request -- workflow_dispatch/workflow_call
      # are single-profile anyway, so this is a no-op there.
      max-parallel: ${{ github.event_name == 'pull_request' && 2 || 1 }}
      matrix:
        # inputs.profile is only populated for workflow_dispatch/workflow_call (the only
        # two triggers that declare an `inputs:` block); schedule/pull_request fall through
        # to the two-profile matrix. See the trigger-comment block above for the full
        # rationale.
        profile: ${{ inputs.profile && fromJSON(format('["{0}"]', inputs.profile)) || fromJSON('["large","manyfiles"]') }}
    # contents:write    - benchmark-action publish steps push to gh-pages.
    # pull-requests:write - PR comparison step posts/updates the sticky comment.
    # Steps that don't need a given perm just don't use it; GitHub doesn't
    # downgrade per-step.
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Full history on pull_request so the base-ref checkout below (used
          # for the same-runner baseline benchmark) can find the base sha.
          # Every other trigger only ever benchmarks the checked-out ref, so
          # a shallow clone is fine there.
          fetch-depth: ${{ github.event_name == 'pull_request' && 0 || 1 }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: npm

      - name: Install Dependencies
        run: npm ci

      # -----------------------------------------------------------------
      # Same-runner baseline benchmark (PR only).
      #
      # Benchmarks the PR's base ref first, on this exact runner, then
      # switches back to the PR head and reinstalls before the normal
      # "Run performance suite" step below benchmarks the head. Both runs
      # share the same machine/OS image/moment in time, so
      # scripts/compare-perf-baseline.mjs (further down) can use a much
      # tighter regression threshold than the gh-pages-history comparison
      # the schedule/workflow_call paths use.
      #
      # perf-results/ is cleared after converting the base run so the head
      # run's own perf-results/ doesn't get merged with the base run's
      # reports by scripts/perf-to-benchmark.mjs (it merges every *.json in
      # the directory by (profile, format) key).
      # -----------------------------------------------------------------
      - name: Save current ref
        if: github.event_name == 'pull_request'
        run: echo "CURRENT_REF=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Checkout PR base ref
        if: github.event_name == 'pull_request'
        run: git checkout --detach --force "${{ github.event.pull_request.base.sha }}"

      - name: Install base-ref dependencies
        if: github.event_name == 'pull_request'
        run: npm ci

      - name: Run baseline performance suite (base ref)
        if: github.event_name == 'pull_request'
        run: npm run test:perf
        env:
          PERF_PROFILE: ${{ matrix.profile }}
          PERF_FORMATS: ${{ inputs.formats || 'xml,json,json5,yaml' }}
          PERF_TYPES: ${{ inputs.types }}
          SF_DISABLE_TELEMETRY: true
          NODE_OPTIONS: '--max-old-space-size=4096'
          RUST_LOG: warn

      - name: Convert baseline perf-results to benchmark JSON
        if: github.event_name == 'pull_request'
        run: |
          node scripts/perf-to-benchmark.mjs
          cp perf-runtime.json perf-runtime-base.json
          cp perf-memory.json perf-memory-base.json
          rm -rf perf-results perf-runtime.json perf-memory.json

      - name: Restore PR head ref
        if: github.event_name == 'pull_request'
        run: git checkout --force "$CURRENT_REF"

      - name: Reinstall head-ref dependencies
        if: github.event_name == 'pull_request'
        run: npm ci

      - name: Print runner facts
        run: |
          echo "## Runner facts" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "image:    $ImageOS / $ImageVersion" >> "$GITHUB_STEP_SUMMARY"
          echo "node:     $(node --version)" >> "$GITHUB_STEP_SUMMARY"
          echo "cpu:      $(grep 'model name' /proc/cpuinfo | head -1 | cut -d: -f2 | xargs)" >> "$GITHUB_STEP_SUMMARY"
          echo "cores:    $(nproc)" >> "$GITHUB_STEP_SUMMARY"
          echo "mem:      $(free -h | awk '/^Mem:/ {print $2}')" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Run performance suite
        run: npm run test:perf
        env:
          PERF_PROFILE: ${{ matrix.profile }}
          PERF_FORMATS: ${{ inputs.formats || 'xml,json,json5,yaml' }}
          PERF_TYPES: ${{ inputs.types }}
          SF_DISABLE_TELEMETRY: true
          # Node tuning for reproducibility:
          #   - disable JIT randomization-sensitive optimizations off by default
          #   - explicit max old space so a leak fails loudly rather than swapping
          NODE_OPTIONS: '--max-old-space-size=4096'
          # Surface sibling-collision fallback signals from the Rust crate
          # alongside the default `error` lines. A WARN here means a synthetic
          # fixture has degenerated to share unique-id values across siblings
          # (the same shape we patch in src/metadata/uniqueIdElements.ts for
          # real metadata). The 0.99 byte-retention guard still catches actual
          # data loss; this just makes the cause visible in the action log.
          # See README -> "XML disassemble output (Rust crate)".
          RUST_LOG: warn

      - name: Summarize results
        if: always()
        run: |
          if [ ! -d perf-results ]; then
            echo "No perf-results/ directory; the test likely failed before reporting." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "## Perf results (profile=${PERF_PROFILE:-large})" >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '| Format | Sample | Elapsed (ms) | Heap Δ (MB) |' >> "$GITHUB_STEP_SUMMARY"
          echo '|---|---|---:|---:|' >> "$GITHUB_STEP_SUMMARY"
          node -e '
            const fs = require("fs"), path = require("path");
            const dir = "perf-results";
            const files = fs.readdirSync(dir).filter(f => f.endsWith(".json")).sort();
            for (const f of files) {
              const r = JSON.parse(fs.readFileSync(path.join(dir, f), "utf8"));
              for (const s of r.samples) {
                const ms = s.elapsedMs.toFixed(1);
                const heap = (s.heapUsedDeltaBytes / 1024 / 1024).toFixed(2);
                process.stdout.write(`| ${r.format} | ${s.label} | ${ms} | ${heap} |\n`);
              }
            }
          ' >> "$GITHUB_STEP_SUMMARY"
        env:
          PERF_PROFILE: ${{ matrix.profile }}

      - name: Upload perf artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: perf-results-${{ matrix.profile }}-${{ github.run_id }}
          path: |
            perf-results/
            perf-comparison.md
            perf-runtime-base.json
            perf-memory-base.json
          retention-days: 90
          if-no-files-found: warn

      # ---------------------------------------------------------------------
      # Publish runtime + memory trends to the gh-pages dashboard.
      #
      # Gated to schedule (weekly) and explicit publish=true callers
      # (release.yml) only so ad-hoc workflow_dispatch runs - which often vary
      # the profile/types/formats inputs - don't pollute the timeline. The
      # dashboard renders at
      #   https://<owner>.github.io/sf-decomposer/dev/bench/runtime/
      #   https://<owner>.github.io/sf-decomposer/dev/bench/memory/
      # First publish creates the gh-pages branch automatically. Pages must
      # be enabled in repo settings (Source: Deploy from branch -> gh-pages).
      #
      # NOTE: do not check `github.event_name == 'workflow_call'` here -
      # inside a reusable workflow `github.event_name` reflects the caller's
      # triggering event (e.g. 'push' from release.yml), never 'workflow_call'.
      #
      # `name:` below is suffixed with matrix.profile ("Decompose Runtime (large)",
      # "Decompose Runtime (manyfiles)") rather than shared across profiles. Each publish
      # call appends a fresh entry to its named series -- it does not merge into an
      # existing entry for the same commit -- so two profiles sharing one name would
      # alternate single-profile entries in that series, and PR runs would fight over the
      # same sticky-comment slot (whichever matrix job finishes last would silently
      # overwrite the other profile's comment). Separate names give each profile its own
      # series and its own sticky comment, with no shared state to collide over.
      # ---------------------------------------------------------------------
      - name: Convert perf-results to benchmark-action JSON
        if: github.event_name == 'schedule' || inputs.publish == true
        run: node scripts/perf-to-benchmark.mjs

      - name: Publish runtime benchmark
        if: github.event_name == 'schedule' || inputs.publish == true
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Decompose Runtime (${{ matrix.profile }})
          tool: customSmallerIsBetter
          output-file-path: ./perf-runtime.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          # GH-hosted runners can swing 20-30% on the same workload; 150% is
          # loose enough to avoid noise but still flag a genuine 1.5x regression.
          alert-threshold: '150%'
          fail-on-alert: false
          comment-on-alert: true
          summary-always: true
          benchmark-data-dir-path: dev/bench/runtime

      - name: Publish memory benchmark
        if: github.event_name == 'schedule' || inputs.publish == true
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Decompose Memory (${{ matrix.profile }})
          tool: customSmallerIsBetter
          output-file-path: ./perf-memory.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          # gh-pages was already fetched by the runtime step above; skip the
          # second fetch to halve checkout time.
          skip-fetch-gh-pages: true
          # Memory deltas are noisier than wall-time; use a wider band.
          alert-threshold: '200%'
          fail-on-alert: false
          summary-always: true
          benchmark-data-dir-path: dev/bench/memory

      # ---------------------------------------------------------------------
      # PR comparison comment: same-runner baseline diff.
      #
      # perf-results/ here only holds the head-ref run (the base-ref run was
      # already converted and cleared out by "Convert baseline perf-results
      # to benchmark JSON" above), so this conversion produces the head-ref's
      # perf-runtime.json / perf-memory.json. scripts/compare-perf-baseline.mjs
      # diffs those against perf-runtime-base.json / perf-memory-base.json
      # (same runner, same job, benchmarked moments earlier) and posts/updates
      # a sticky PR comment - see that script for the threshold rationale.
      #
      # This never touches gh-pages (no auto-push/save-data-file here at
      # all) and never fails the job: regressions surface as a comment and a
      # ::warning:: annotation, matching the rest of this workflow's
      # fail-on-alert: false stance.
      # ---------------------------------------------------------------------
      - name: Convert perf-results for PR comparison
        if: github.event_name == 'pull_request'
        run: node scripts/perf-to-benchmark.mjs

      - name: Compare against same-runner baseline (PR)
        if: github.event_name == 'pull_request'
        run: node scripts/compare-perf-baseline.mjs
        env:
          PERF_PROFILE: ${{ matrix.profile }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
