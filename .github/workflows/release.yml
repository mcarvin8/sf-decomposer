name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          release-type: node

  unit-tests:
    name: Unit Tests (ubuntu-latest, node 20)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '20'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:only
        env:
          SF_DISABLE_TELEMETRY: true

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          fail_ci_if_error: true

  release:
    name: Release
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest

    outputs:
      published: ${{ steps.publish.outputs.published }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to NPM
        id: publish
        run: |
          NODE_AUTH_TOKEN="" npm publish --access public --tag latest --provenance
          echo "published=true" >> "$GITHUB_OUTPUT"

  smoke-test:
    needs: release
    if: needs.release.outputs.published == 'true'
    uses: ./.github/workflows/smoke-test.yml
    secrets: inherit

  perf-baseline:
    # Runs after a successful publish so every released version has a
    # comparable timing artifact attached to its run. Does not gate the
    # release - it's an observability run, not a quality gate.
    needs: smoke-test
    if: needs.release.outputs.published == 'true'
    uses: ./.github/workflows/perf.yml
    with:
      profile: large
      publish: true
    secrets: inherit
