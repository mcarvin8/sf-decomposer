name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          release-type: node

  unit-tests:
    name: Unit Tests (ubuntu-latest, node LTS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test
        env:
          SF_DISABLE_TELEMETRY: true

      - name: Upload coverage
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          fail_ci_if_error: true

  release:
    name: Release
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest

    outputs:
      published: ${{ steps.publish.outputs.published }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install Dependencies
        run: npm ci

      - name: Publish to NPM
        id: publish
        run: |
          NODE_AUTH_TOKEN="" npm publish --access public --tag latest --provenance
          echo "published=true" >> "$GITHUB_OUTPUT"

  smoke-test:
    needs: release
    if: needs.release.outputs.published == 'true'
    uses: ./.github/workflows/smoke-test.yml
    secrets: inherit

  perf-baseline:
    # Runs after a successful publish so every released version has a
    # comparable timing artifact attached to its run. Does not gate the
    # release - it's an observability run, not a quality gate.
    needs: [smoke-test, release]
    if: needs.release.outputs.published == 'true'
    uses: ./.github/workflows/perf.yml
    with:
      profile: large
      publish: true
    secrets: inherit

  perf-baseline-manyfiles:
    # Chained after perf-baseline (not parallel): both jobs push to the same
    # gh-pages branch/file via auto-push:true, and two concurrent workflow_call
    # invocations racing that push is exactly the hazard perf.yml's
    # max-parallel:1 guards against for its own in-job matrix. Sequential here
    # costs nothing real - release publishing isn't on anyone's feedback loop.
    needs: [smoke-test, release, perf-baseline]
    if: needs.release.outputs.published == 'true'
    uses: ./.github/workflows/perf.yml
    with:
      profile: manyfiles
      publish: true
    secrets: inherit
